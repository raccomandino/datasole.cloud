<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Sole — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Lato:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --text: #0d2c45;
    --accent: #2e7eb8;
    --sky-mid: #98cce8;
  }

  html, body { width:100%; height:100%; overflow:hidden; }

  body {
    background: linear-gradient(180deg,
      #a8d4ed 0%, #c4e4f4 18%, #ddf0fb 40%,
      #cde8f6 60%, #b8dcef 80%, #98c8e0 100%
    );
    position: relative;
    font-family: 'Lato', sans-serif;
  }

  /* Sun */
  .sun {
    position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
    width: 560px; height: 560px; border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,252,220,.75) 0%, rgba(255,240,180,.45) 28%,
      rgba(200,230,255,.15) 60%, transparent 72%
    );
    pointer-events: none; z-index: 1;
    animation: sunBreath 8s ease-in-out infinite;
  }
  @keyframes sunBreath {
    0%,100%{ opacity:.85; transform:translateX(-50%) scale(1); }
    50%    { opacity:1;   transform:translateX(-50%) scale(1.07); }
  }

  /* Distant cloud wisps */
  .clouds-bg { position:fixed;inset:0;z-index:2;overflow:hidden;pointer-events:none; }
  .cb {
    position:absolute; border-radius:50%;
    background:radial-gradient(ellipse,rgba(255,255,255,.30) 0%,transparent 70%);
    animation:drift linear infinite;
  }
  .cb:nth-child(1){ width:800px;height:200px;top:8%;left:-400px;animation-duration:65s; }
  .cb:nth-child(2){ width:500px;height:130px;top:45%;left:-250px;animation-duration:80s;animation-delay:-22s; }
  .cb:nth-child(3){ width:700px;height:180px;top:70%;left:-300px;animation-duration:72s;animation-delay:-40s;opacity:.6; }
  @keyframes drift{ from{transform:translateX(0)} to{transform:translateX(120vw)} }

  /* Foreground clouds */
  .clouds-fg { position:fixed;inset:0;z-index:3;overflow:hidden;pointer-events:none; }
  .cf { position:absolute; animation:driftFg linear infinite; }
  @keyframes driftFg{ from{transform:translateX(-120%)} to{transform:translateX(120vw)} }
  .cloud-shape {
    position:relative; width:220px; height:70px;
    background:rgba(255,255,255,.55); border-radius:50px;
  }
  .cloud-shape::before,.cloud-shape::after {
    content:''; position:absolute;
    background:rgba(255,255,255,.55); border-radius:50%;
  }
  .cloud-shape::before{ width:80px;height:80px;top:-40px;left:30px; }
  .cloud-shape::after { width:110px;height:90px;top:-50px;left:80px; }
  .cf:nth-child(1){ top:12%;animation-duration:42s;animation-delay:-5s; }
  .cf:nth-child(2){ top:38%;animation-duration:55s;animation-delay:-18s; }
  .cf:nth-child(3){ top:62%;animation-duration:48s;animation-delay:-30s; }
  .cf:nth-child(2) .cloud-shape{ width:280px;height:80px;background:rgba(255,255,255,.45); }
  .cf:nth-child(2) .cloud-shape::before{ width:100px;height:100px;top:-52px;left:40px; }
  .cf:nth-child(2) .cloud-shape::after { width:140px;height:110px;top:-65px;left:110px; }

  /* Particles */
  .particles{ position:fixed;inset:0;pointer-events:none;z-index:4;overflow:hidden; }
  .pdot {
    position:absolute; border-radius:50%; background:rgba(255,255,255,.7);
    animation:floatUp linear infinite;
  }
  @keyframes floatUp{
    0%  { transform:translateY(0) scale(1); opacity:.65; }
    80% { opacity:.25; }
    100%{ transform:translateY(-100vh) scale(.4); opacity:0; }
  }

  /* ── Wrapper ── */
  .wrapper {
    position:relative; z-index:10;
    width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }

  /* ── Hero cloud card ── */
  .hero-cloud {
    position:relative;
    width:min(680px, 92vw);
    padding: 3rem 2.8rem 2.6rem;
    text-align:center;
    animation:floatHero 8s ease-in-out infinite;
  }
  .hero-cloud::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse 100% 85% at 50% 42%,
      rgba(255,255,255,.93) 0%,
      rgba(240,250,255,.82) 45%,
      rgba(210,238,255,.60) 75%,
      transparent 100%
    );
    border-radius:18px;
    z-index:-1;
    box-shadow:
      0 30px 70px rgba(30,100,160,.15),
      0 8px 25px rgba(30,100,160,.10),
      inset 0 2px 0 rgba(255,255,255,.95);
  }
  @keyframes floatHero{
    0%,100%{transform:translateY(0) rotate(-.2deg);}
    33%    {transform:translateY(-14px) rotate(.15deg);}
    66%    {transform:translateY(-7px) rotate(-.1deg);}
  }

  /* ── Logo static ── */
  .logo-static {
    width: 86px;
    height: 86px;
    border-radius: 50%;
    margin: 0 auto .8rem;
    animation: fadeDown 1.2s cubic-bezier(.22,1,.36,1) both;
    box-shadow: 0 4px 18px rgba(30,90,140,.15);
    overflow: hidden;
  }
  .logo-static img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  @keyframes fadeDown{
    from{opacity:0;transform:translateY(-28px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* ── Presents ── */
  .presents {
    font-size:clamp(.65rem,1.6vw,.78rem);
    font-weight:300; letter-spacing:.5em;
    text-transform:uppercase; color:#2e5c80; opacity:.65;
    margin-bottom:.4rem;
    animation:fadeDown 1.2s .12s cubic-bezier(.22,1,.36,1) both;
  }

  /* ── Wordmark ── */
  .wordmark {
    font-family:'Cinzel',serif;
    font-size:clamp(3rem,8.5vw,5.6rem);
    font-weight:500; line-height:.9;
    color:var(--text); letter-spacing:-.01em;
    margin-bottom:.25em;
    animation:fadeUp 1.2s .22s cubic-bezier(.22,1,.36,1) both;
  }
  .wordmark em{ font-style:italic; color:var(--accent); }

  /* ── Sub-headline ── */
  .subhead {
    font-family:'Lato',sans-serif;
    font-size:clamp(.78rem,2vw,.95rem);
    font-weight:300; font-style:italic;
    letter-spacing:.22em; text-transform:uppercase;
    color:#2e5c80; opacity:.8;
    margin-bottom:.9rem;
    animation:fadeUp 1.2s .34s cubic-bezier(.22,1,.36,1) both;
  }

  /* ── Divider ── */
  .divider {
    display:flex; align-items:center; justify-content:center;
    gap:10px; margin:.5rem 0 1rem;
    animation:fadeUp 1.2s .44s cubic-bezier(.22,1,.36,1) both;
  }
  .div-line{ height:1px; width:50px; background:linear-gradient(to right,transparent,var(--accent),transparent); }
  .div-node{ width:5px; height:5px; border-radius:50%; background:var(--accent); opacity:.6; }
  .div-circuit{ opacity:.4; }

  /* ── Coming Soon badge ── */
  .badge {
    display:inline-block;
    font-size:.7rem; font-weight:700; letter-spacing:.35em;
    text-transform:uppercase; color:#fff;
    background:linear-gradient(135deg,#2e7eb8,#1865a0);
    border-radius:100px; padding:.48em 2em;
    margin-bottom:1.8rem;
    box-shadow:0 4px 22px rgba(30,100,170,.38);
    animation:fadeUp 1.2s .54s cubic-bezier(.22,1,.36,1) both;
    position:relative; overflow:hidden;
  }
  .badge::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
    transform:translateX(-100%);
    animation:shimmer 3.2s 1.8s infinite;
  }
  @keyframes shimmer{ to{transform:translateX(100%)} }

  /* ── Countdown ── */
  .countdown {
    display:flex; gap:clamp(.7rem,2.5vw,1.8rem); justify-content:center;
    margin-bottom:2rem;
    animation:fadeUp 1.2s .65s cubic-bezier(.22,1,.36,1) both;
  }
  .cu{ display:flex;flex-direction:column;align-items:center;gap:.2rem; }
  .cn {
    font-family:'Cinzel',serif;
    font-size:clamp(1.9rem,5.5vw,3rem);
    font-weight:400; line-height:1;
    color:var(--text); min-width:2ch; text-align:center;
  }
  .cl{ font-size:.52rem;letter-spacing:.25em;text-transform:uppercase;color:#2e5c80;opacity:.6;font-weight:700; }
  .csep{ font-family:'Cinzel',serif;font-size:2.2rem;font-weight:300;color:var(--sky-mid);opacity:.5;align-self:flex-start;padding-top:.1rem;line-height:1.15; }

  /* ── Social bar ── */
  .social-bar {
    display:flex; align-items:center; justify-content:center;
    border-top:1px solid rgba(46,100,160,.14);
    padding-top:1.2rem; gap:0;
    animation:fadeUp 1.2s .85s cubic-bezier(.22,1,.36,1) both;
  }
  .social-bar a {
    display:flex; align-items:center; gap:.4rem;
    color:#1e4d78; text-decoration:none;
    font-size:.68rem; font-weight:400; letter-spacing:.13em; text-transform:uppercase;
    padding:.6em 1.5em; border-radius:100px;
    transition:background .2s, color .2s, box-shadow .2s;
    opacity:.72;
  }
  .social-bar a:hover{
    background:rgba(46,126,184,.13);
    opacity:1; color:#1560a0;
    box-shadow:0 2px 10px rgba(46,126,184,.15);
  }
  .sbar-div{
    width:1px; height:20px;
    background:rgba(46,100,160,.18);
    flex-shrink:0;
  }

  /* ── Copyright ── */
  .bottom{
    position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);z-index:20;
    font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;
    color:rgba(255,255,255,.5);font-family:'Lato',sans-serif;white-space:nowrap;
    animation:fadeUp 1.5s 1.2s both;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
  }

</style>
</head>
<body>

<div class="sun"></div>

<div class="clouds-bg">
  <div class="cb"></div><div class="cb"></div><div class="cb"></div>
</div>

<div class="clouds-fg">
  <div class="cf"><div class="cloud-shape"></div></div>
  <div class="cf"><div class="cloud-shape"></div></div>
  <div class="cf"><div class="cloud-shape"></div></div>
</div>

<div class="particles" id="particles"></div>

<div class="wrapper">
  <div class="hero-cloud">

    <!-- Logo -->
    <div class="logo-static">
      <img src="/assets/Datasole Logo.PNG" alt="Data Sole Logo">
    </div>

    <!-- Presents -->
    <div class="presents">Skydatasol Presents</div>

    <!-- Brand name -->
    <div class="wordmark">Data <em>Sole</em></div>

    <!-- Sub-headline -->
    <div class="subhead">Elevated Cloud Infrastructure</div>

    <!-- Divider -->
    <div class="divider">
      <div class="div-line"></div>
      <div class="div-node"></div>
      <svg class="div-circuit" width="30" height="18" viewBox="0 0 30 18" fill="none">
        <path d="M2 16 L7 10 L13 15 L20 4 L28 9" stroke="#2e7eb8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="2" cy="16" r="1.6" fill="#2e7eb8"/>
        <circle cx="28" cy="9" r="1.6" fill="#2e7eb8"/>
      </svg>
      <div class="div-node"></div>
      <div class="div-line"></div>
    </div>

    <!-- Coming Soon badge -->
    <div class="badge">Coming Soon</div>

    <!-- Countdown to 30 Sep 2027 -->
    <div class="countdown">
      <div class="cu"><div class="cn" id="days">00</div><div class="cl">Days</div></div>
      <div class="csep">·</div>
      <div class="cu"><div class="cn" id="hours">00</div><div class="cl">Hours</div></div>
      <div class="csep">·</div>
      <div class="cu"><div class="cn" id="mins">00</div><div class="cl">Mins</div></div>
      <div class="csep">·</div>
      <div class="cu"><div class="cn" id="secs">00</div><div class="cl">Secs</div></div>
    </div>

    <!-- Social bar -->
    <div class="social-bar">
      <!-- Website -->
      <a href="https://skydatasol.com" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        skydatasol.com
      </a>

      <div class="sbar-div"></div>

      <!-- LinkedIn -->
      <a href="https://www.linkedin.com/company/datasole/" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.447 20.452H17.21v-5.569c0-1.328-.024-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H10V9.052h3.102v1.561h.044c.432-.82 1.488-1.685 3.063-1.685 3.275 0 3.879 2.156 3.879 4.961v6.563zM5.337 7.433a1.797 1.797 0 1 1 0-3.594 1.797 1.797 0 0 1 0 3.594zm1.604 13.019H3.733V9.052h3.208v11.4zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        LinkedIn
      </a>

      <div class="sbar-div"></div>

      <!-- Contact -->
      <a href="mailto:info@skydatasol.com">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        Contact
      </a>
    </div>

  </div>
</div>

<div class="bottom">© 2026 Skydatasol Ltd · All Rights Reserved</div>

<script>
  // Countdown to 30 September 2027
  const target = new Date('2027-09-30T00:00:00');
  const pad = n => String(n).padStart(2,'0');
  function tick() {
    let d = Math.max(0, target - new Date());
    const days = Math.floor(d/86400000); d%=86400000;
    const hrs  = Math.floor(d/3600000);  d%=3600000;
    const mins = Math.floor(d/60000);    d%=60000;
    const secs = Math.floor(d/1000);
    document.getElementById('days').textContent  = pad(days);
    document.getElementById('hours').textContent = pad(hrs);
    document.getElementById('mins').textContent  = pad(mins);
    document.getElementById('secs').textContent  = pad(secs);
  }
  tick(); setInterval(tick, 1000);

  // Particles
  const pc = document.getElementById('particles');
  for (let i=0;i<24;i++){
    const d=document.createElement('div');
    d.className='pdot';
    const s=Math.random()*3.5+1;
    d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;
      bottom:${Math.random()*35}vh;
      animation-duration:${Math.random()*12+7}s;
      animation-delay:${Math.random()*-22}s;
      opacity:${Math.random()*.4+.2};`;
    pc.appendChild(d);
  }
</script>
</body>
</html>
